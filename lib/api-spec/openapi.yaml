openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BetPredict Pro API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: matches
    description: Match operations
  - name: predictions
    description: Prediction operations
  - name: leagues
    description: League and country operations
  - name: bet-of-the-day
    description: Bet of the day operations
  - name: sync
    description: Real data sync operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches with filters
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: leagueId
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: date
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, live, finished]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchListResponse"

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a match with full prediction details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Match with predictions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /hot-games:
    get:
      operationId: getHotGames
      tags: [matches]
      summary: Get high-value hot games
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Hot games list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /bet-of-the-day:
    get:
      operationId: getBetOfTheDay
      tags: [bet-of-the-day]
      summary: Get the AI-generated bet of the day
      responses:
        "200":
          description: Bet of the day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetOfTheDay"

  /bet-of-the-day/regenerate:
    post:
      operationId: regenerateBetOfTheDay
      tags: [bet-of-the-day]
      summary: Regenerate the bet of the day
      responses:
        "200":
          description: New bet of the day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BetOfTheDay"

  /leagues:
    get:
      operationId: listLeagues
      tags: [leagues]
      summary: List all available leagues
      parameters:
        - name: country
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Leagues list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/League"

  /countries:
    get:
      operationId: listCountries
      tags: [leagues]
      summary: List all countries with matches
      responses:
        "200":
          description: Countries list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [predictions]
      summary: Get platform statistics summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /predictions/accuracy:
    get:
      operationId: getPredictionAccuracy
      tags: [predictions]
      summary: Get prediction accuracy breakdown by league
      responses:
        "200":
          description: Accuracy data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeagueAccuracy"

  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [sync]
      summary: Get current sync status
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /sync:
    post:
      operationId: triggerSync
      tags: [sync]
      summary: Trigger a background sync of real fixtures
      responses:
        "200":
          description: Sync started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    TeamPrediction:
      type: object
      properties:
        winProbability:
          type: number
        form:
          type: string
        recentGoalsScored:
          type: number
        recentGoalsConceded:
          type: number
        homeAwayRecord:
          type: string
      required:
        - winProbability
        - form
        - recentGoalsScored
        - recentGoalsConceded
        - homeAwayRecord

    Match:
      type: object
      properties:
        id:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        homeTeamLogo:
          type: string
        awayTeamLogo:
          type: string
        league:
          type: string
        leagueId:
          type: string
        country:
          type: string
        countryFlag:
          type: string
        matchDate:
          type: string
        matchTime:
          type: string
        status:
          type: string
          enum: [upcoming, live, finished]
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        homeWinOdds:
          type: number
        drawOdds:
          type: number
        awayWinOdds:
          type: number
        confidenceScore:
          type: number
        prediction:
          type: string
          enum: [home, draw, away, home_or_draw, away_or_draw, btts, over25]
        predictionLabel:
          type: string
        valueRating:
          type: number
        isHot:
          type: boolean
      required:
        - id
        - homeTeam
        - awayTeam
        - league
        - leagueId
        - country
        - matchDate
        - matchTime
        - status
        - homeWinOdds
        - drawOdds
        - awayWinOdds
        - confidenceScore
        - prediction
        - predictionLabel
        - valueRating
        - isHot

    MatchDetail:
      allOf:
        - $ref: "#/components/schemas/Match"
        - type: object
          properties:
            homeTeamPrediction:
              $ref: "#/components/schemas/TeamPrediction"
            awayTeamPrediction:
              $ref: "#/components/schemas/TeamPrediction"
            headToHead:
              type: array
              items:
                $ref: "#/components/schemas/H2HRecord"
            analysisNotes:
              type: array
              items:
                type: string
            bttsProb:
              type: number
            over25Prob:
              type: number
            expectedHomeGoals:
              type: number
            expectedAwayGoals:
              type: number
          required:
            - homeTeamPrediction
            - awayTeamPrediction
            - headToHead
            - analysisNotes
            - bttsProb
            - over25Prob
            - expectedHomeGoals
            - expectedAwayGoals

    H2HRecord:
      type: object
      properties:
        date:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        homeScore:
          type: integer
        awayScore:
          type: integer
      required: [date, homeTeam, awayTeam, homeScore, awayScore]

    BetOfTheDaySelection:
      type: object
      properties:
        matchId:
          type: string
        homeTeam:
          type: string
        awayTeam:
          type: string
        league:
          type: string
        country:
          type: string
        prediction:
          type: string
        predictionLabel:
          type: string
        odds:
          type: number
        confidenceScore:
          type: number
        matchDate:
          type: string
        matchTime:
          type: string
      required:
        - matchId
        - homeTeam
        - awayTeam
        - league
        - country
        - prediction
        - predictionLabel
        - odds
        - confidenceScore
        - matchDate
        - matchTime

    BetOfTheDay:
      type: object
      properties:
        id:
          type: string
        generatedAt:
          type: string
        totalOdds:
          type: number
        averageConfidence:
          type: number
        selections:
          type: array
          items:
            $ref: "#/components/schemas/BetOfTheDaySelection"
        analysisNote:
          type: string
      required:
        - id
        - generatedAt
        - totalOdds
        - averageConfidence
        - selections
        - analysisNote

    League:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        country:
          type: string
        countryFlag:
          type: string
        logo:
          type: string
        matchCount:
          type: integer
      required: [id, name, country, matchCount]

    Country:
      type: object
      properties:
        name:
          type: string
        flag:
          type: string
        leagueCount:
          type: integer
        matchCount:
          type: integer
      required: [name, leagueCount, matchCount]

    MatchListResponse:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required: [matches, total, page, limit, totalPages]

    StatsSummary:
      type: object
      properties:
        totalMatches:
          type: integer
        hotGames:
          type: integer
        avgConfidence:
          type: number
        successRate:
          type: number
        totalLeagues:
          type: integer
        totalCountries:
          type: integer
        todayMatches:
          type: integer
      required:
        - totalMatches
        - hotGames
        - avgConfidence
        - successRate
        - totalLeagues
        - totalCountries
        - todayMatches

    LeagueAccuracy:
      type: object
      properties:
        league:
          type: string
        country:
          type: string
        accuracy:
          type: number
        totalPredictions:
          type: integer
        correct:
          type: integer
      required: [league, country, accuracy, totalPredictions, correct]

    SyncStatus:
      type: object
      properties:
        lastSyncAt:
          type: string
          nullable: true
        inProgress:
          type: boolean
      required: [lastSyncAt, inProgress]

    SyncResult:
      type: object
      properties:
        synced:
          type: integer
        errors:
          type: array
          items:
            type: string
        lastSyncAt:
          type: string
          nullable: true
        message:
          type: string
      required: [synced, errors]
